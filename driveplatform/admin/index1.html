<!doctype html>
<html lang="el">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Drive Rentals — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles1.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo"></div>
        <div class="brand-text">
          <div class="brand-title">Drive Rentals</div>
          <div class="brand-sub">Admin Dashboard</div>
        </div>
      </div>

      <nav class="nav" id="nav">
        <a class="nav-item active" data-route="dashboard" href="#">
          <span class="dot"></span> Dashboard
        </a>
        <a class="nav-item" data-route="cars" href="#">
          <span class="dot"></span> Cars
        </a>
        <a class="nav-item" data-route="bookings" href="#">
          <span class="dot"></span> Bookings
        </a>
        <a class="nav-item" data-route="customers" href="#">
          <span class="dot"></span> Customers
        </a>
        <a class="nav-item" data-route="payments" href="#">
          <span class="dot"></span> Payments
        </a>
        <a class="nav-item" data-route="settings" href="#">
          <span class="dot"></span> Settings
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="mini-card">
          <div class="mini-title">Status</div>
          <div class="mini-row">
            <span class="pill ok">Online</span>
            <span class="mini-muted">v1.0</span>
          </div>
        </div>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="top-left">
          <h1 id="pageTitle">Drive Rentals</h1>
          <p id="pageSubtitle">Διαχειρίσου στόλο, τιμές και κρατήσεις σε ένα μέρος.</p>
        </div>

        <div class="top-right">
          <div class="search">
            <input id="globalSearch" placeholder="Αναζήτηση..." />
            <button id="clearSearch" title="Καθαρισμός">✕</button>
          </div>
          <button class="btn secondary" id="exportBtn">Export</button>
          <button class="btn primary" id="primaryActionBtn">+ Add</button>
        </div>
      </header>

      <!-- εδώ αλλάζει η “σελίδα” -->
      <section id="viewRoot" class="view-root"></section>
    </main>
  </div>

  <!-- Modal -->
  <div class="modal-backdrop" id="modalBackdrop" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-head">
        <div>
          <div id="modalTitle" class="modal-title">Modal</div>
          <div id="modalDesc" class="modal-desc">—</div>
        </div>
        <button class="icon-btn" id="modalClose">✕</button>
      </div>
      <div id="modalBody" class="modal-body"></div>
      <div class="modal-foot">
        <button class="btn secondary" id="modalCancel">Cancel</button>
        <button class="btn primary" id="modalOk">Save</button>
      </div>
    </div>
  </div>

  <script src="app1.js"></script>
</body>
</html>
